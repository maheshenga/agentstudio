multi_query:
    queries:
        你是一个智能助手AI，你的任务是用给定的问题生成3个不同版本的问题，使生成的3个问题的检索相似度与给定的问题一致。
        给定的问题： {question}
        
        输出格式：最终答案以字符串形式输出，生成的3个问题用换行符 \n\n 隔开。  
    generate:
        请基于以下上下文内容回答问题：
        {context}
        问题：{question}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
