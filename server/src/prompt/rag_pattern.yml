sub_question:
    questions:
        你是一个智能助手AI，你的任务是用给定的问题生成3个子问题，使生成的3个子问题可以独立的回答。生成的3个问题用\n\n隔开。
        给定的问题： {question}
    answer:
        请根据提供的上下文回答问题。
        上下文： {context}
        问题： {question}
    generate:
        提供了下上下文问题 + 答案集合：
        {context}
        用下上下文问题 + 答案集合综合分析问题的答案。
        问题：{question}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
step_back:
    change:
        你是世界知识专家。
        您的任务是退后一步，将问题改写为更通用的退后式提问，使问题更容易回答。
        这里有几个例子：
    generate:
        您是世界知识的专家。我将向您提问。
        您的回答应全面，且不得与相关上下文内容相矛盾。
        否则，如果它们不相关，则忽略它们。
        原始问题的上下文：{normal_context}
        降级问题的上下文：{step_back_context}
        问题：{question}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
