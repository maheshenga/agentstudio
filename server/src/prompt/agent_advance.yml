search_agent:
    analyze: |
        你是一位问题复杂度分析专家，请根据请对以下问题的整体复杂度进行分析和评分。

        评分标准：

        0.0：问题极其简单，定义清晰、输入输出明确、无需领域知识，可直接用基础逻辑或单步操作解决。
        1.0：问题极度复杂，涉及多领域知识、高度不确定性、模糊目标、大规模数据/状态空间、或需要创造性推理与长期规划。
        分数应综合考虑以下维度：
        • 问题定义的清晰度
        • 所需知识的广度与深度
        • 输入/约束/目标的模糊性或动态性
        • 解决方案的计算或认知难度
        • 是否涉及多步骤推理、权衡或不确定性处理
        输出格式：

        仅返回一个 0 到 1 之间的浮点数（保留两位小数），不要包含任何解释、单位或额外文本。

        待评估问题：{question}
        
        输出符合上述格式的 JSON
        {format_instructions}
    research: |
        将这个研究主题分解为3-5个具体的、 可搜索的查询：
        {topic}

        让每个查询都集中且可操作。
        以中文回答。
        
        最终分解的查询间以 \n\n 隔开输出。
    generate: |
        你是一位问题解答专家，请根据提供的上下文回答用户问题，务必按上下文事实回答，不得自行杜撰和扩展。
            
        上下文： {context}
        用户问题： {question}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
        
        请务必用中文详尽的回答问题。
topic_agent:
    research: |
        将这个研究主题分解为3-5个具体的、 可搜索的查询：
        {topic}

        让每个查询都集中且可操作。
        以中文回答。
        
        请按照以下格式输出：
        1.xxxxx
        
        2.xxxxx
        
        3.xxxxx
    extract: |
        提取以下文本的关键词：
        {document}
        只返回提取的关键字，不带任何说明
    analyze: |
        分析以下文本的情感：
        {document}

        以中文回答情感是正面还是负面，不带任何说明。
    summary: |
        总结以下文本的内容：
        {document}
        只返回总结的结果，不带任何说明。
    generate: |
        你是一位主题报告撰写专家。请根据主题、关键字、情感和总结，撰写一篇严谨详实的主题报告。
            
        主题：{topic}
        关键字、情感和总结: {context}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
        
        请用中文详尽撰写。
        
        以markdown格式输出：
        一、封面（Cover Page）
        报告标题（清晰、准确、简洁，可含副标题）
        作者姓名
        所属单位（学校、公司、机构）
        提交对象（如：指导老师、部门领导、客户名称）
        完成日期（年月日）
        示例：
        《人工智能在医疗影像诊断中的应用现状与挑战》
        作者：
        单位：XX大学计算机学院
        提交至：国家自然科学基金项目组
        日期：2025年11月20日
            
        二、摘要（Abstract）（200–500字）
        目的：研究要解决什么问题？
        方法：采用什么研究方法或技术路线？
        结果：主要发现或数据是什么？
        结论：得出什么结论？有何意义或建议？
        要求：独立成文，不引用图表/参考文献，避免缩写（首次出现需全称）。
            
        三、关键词（Keywords）（3–8个）
        选取能代表报告核心内容的专业术语
        中文报告常用中文关键词，英文报告用英文
        示例：人工智能；医学影像；深度学习；辅助诊断；模型可解释性
        
        四、目录（Table of Contents）
        自动生成（推荐使用 Word / LaTeX 的目录功能）
        包含章节标题及对应页码
        可包含图表目录（如报告中图表较多）
        
        五、引言 / 绪论（Introduction）
        研究背景与意义（为什么值得研究？）
        国内外研究现状综述（简要回顾相关工作，指出空白）
        研究目标与核心问题
        报告结构安排（“本文共分X章，第一章……”）
        目的：让读者理解“为什么要研究这个问题”以及“本报告如何展开”。
        
        六、研究方法 / 理论框架（Methodology / Theoretical Framework）
        研究设计（定性/定量/混合？案例研究/实验/调查？）
        数据来源（问卷、数据库、实验采集、公开数据集等）
        分析工具或模型（如 Python、SPSS、Qdrant、BERT 等）
        技术路线图（可选，用流程图展示步骤）
        伦理说明（如涉及人类受试者）
        要求：可复现性——他人应能根据描述重复你的研究。
            
        七、研究结果 / 分析与讨论（Results / Analysis and Discussion）
        客观呈现结果（用文字、表格、图表）
        对结果进行解释和分析（为什么会出现这样的结果？）
        与已有研究对比（支持还是矛盾？原因是什么？）
        讨论结果的合理性、局限性、意外发现
        建议：
        图表需有编号和标题（如“图1：准确率对比”）
        避免在结果部分直接下结论，留到“结论”章节
        
        八、结论与建议（Conclusion and Recommendations）
        总结主要研究发现（呼应引言中的问题）
        强调研究的理论或实践价值
        提出具体建议（政策建议、技术改进、管理措施等）
        指出研究局限性
        展望未来研究方向
        避免：引入新数据或新观点！
            
        九、参考文献（References）
        按照统一格式列出所有引用文献
        常见格式：
        学术论文：APA、MLA、Chicago、GB/T 7714（中国国标）
        工程/技术报告：IEEE 格式
        要求：真实、完整、规范
        示例（GB/T 7714）：
        [1] 刘知远, 孙茂松. 大模型时代的自然语言处理[J]. 中文信息学报, 2023, 37(6): 1–15.
