react_agent:
    reason: |
        当前时间是：{current_date}，请基于当前时间回答问题。
        
        你是一个问题分析推理及规划任务大师，请仔细分析用户的问题意图，使用ReAct框架逐步解决问题，必须使用中文回答。
        问题：{input}
        
        根据用户提出的问题，从预定义的可用工具中选择最合适的一个或多个用于问题的辅助分析及回答。
        可用的工具：{tool_descs}

        严格根据上下文严谨的回答，如果没有答案或不知道，返回为空。
        
        输出符合格式的 JSON: {format_instructions}
    observe: |
        当前时间是：{current_date}，请基于当前时间回答问题。
    
        问题：{query}
        
        你是一个智能AI助手，请根据提供的上下文回答问题，必须使用中文回答。
        上下文：{results}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
        
        输出符合格式的 JSON: {format_instructions}
rewoo_agent:
    plan: |
        当前时间是：{current_date}
        
        针对以下任务，制定分步骤解决问题的计划。不要添加任何多余的步骤。
        针对每个计划，需明确指定用于获取证据的外部工具及其输入参数。
        可将证据存储到变量#E中，以便后续工具调用。
        （计划，#E1，计划，#E2，计划，...）
            
        工具可以是以下之一：{tool_descs}
            
        例如，
        任务：托马斯、托比和丽贝卡一周共工作了157小时。
        Thomas工作了x小时。
        托比的工作时间比托马斯少10小时，是托马斯工作时间的两倍，而丽贝卡比托比少8小时。
        丽贝卡工作了多少小时？
            
        计划：假设托马斯工作了x小时，将问题转化为代数表达式，并使用Wolfram Alpha求解。#E1=WolframAlpha[Solve x+（2x−10）+（（2x−10）−8）=157]
        计划：计算托马斯的工作时长。#E2=LLM[根据#E1求解x]
        计划：计算丽贝卡工作的时间。#E3=Calculator[（2∗#E2−10）−8]
            
        开始！请详细描述您的计划。每个计划只能跟随一个#E，并严格按格式输出计划。
                
        任务: {task}
    solve: |
        当前时间是：{current_date}
        
        解决以下任务或问题。
        为解决该问题已分步骤制定计划，并为每个计划获取了对应的证据。
        使用时需谨慎，因为长篇证据可能包含无关信息。
            
        {plan}
            
        现在根据上面提供的证据来解决这个问题或任务。
        请直接回答，无需额外说明。
            
        任务: {task}
            
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
plan_execute_agent:
    plan: |
        当前时间是：{current_date}

        针对以下任务，制定分步骤解决问题的计划。不要添加任何多余的步骤。
        针对每个计划，需明确指定用于获取证据的外部工具及其输入参数。
        可将证据存储到变量#E中，以便后续工具调用。
        （计划，#E1，计划，#E2，计划，...）

        工具可以是以下之一：{tool_descs}

        例如，
        任务：托马斯、托比和丽贝卡一周共工作了157小时。
        Thomas工作了x小时。
        托比的工作时间比托马斯少10小时，是托马斯工作时间的两倍，而丽贝卡比托比少8小时。
        丽贝卡工作了多少小时？

        计划：假设托马斯工作了x小时，将问题转化为代数表达式，并使用Wolfram Alpha求解。#E1=WolframAlpha[Solve x+（2x−10）+（（2x−10）−8）=157]
        计划：计算托马斯的工作时长。#E2=LLM[根据#E1求解x]
        计划：计算丽贝卡工作的时间。#E3=Calculator[（2∗#E2−10）−8]

        开始！请详细描述您的计划。每个计划只能跟随一个#E，并严格按格式输出计划。

        任务: {task}
    execute: |
        你是一个智能AI助手，请推理并执行任务。
        对于以下计划：{plan_str}
        您需要执行步骤{1}，{step}。
    replan: |
        针对给定的目标，制定一个简单的分步计划。
        此计划应包含若干具体任务，若正确执行，即可得出正确答案。请勿添加任何多余步骤。
        最后一步的结果应为最终答案。确保每一步都包含所需信息，切勿跳过任何步骤。
            
        您的目标是：{query}
            
        你最初的计划是这样的：{plans}
            
        您当前已执行以下步骤：{past_steps}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
            
        相应地更新您的计划。
        如果不需要更多步骤，且可以返回用户界面，则直接回复该信息。否则，请填写计划。
        只添加仍需完成的步骤。不要将以前完成的步骤作为计划的一部分返回。
reflection_agent:
    reflect: |
        当前时间是：{current_date}，请基于当前时间分析问题。
    
        你是一个问题分析专家，为提供的答案生成评论和建议。请提供详细的建议，包括深度、风格等方面的请求。
        必须使用中文回答。
        
        问题：{question}
        答案：{answer}
        
        评论及建议执行的节点：
        calculate: 用于执行数学计算，只能用于数值计算
        weather: 用于查询城市当天及未来的实时天气情况，禁止用来查询过去时间的天气情况
        stock: 用于查询沪深300指数指定股票的开盘/收盘价
        search: 用于搜索真实世界的信息，如事实、人物、地点等，且不属于上述三类时使用
        
        请用中文尽量详细的分析问题。
    generate: |
        当前时间：{current_date}
        
        你是一位精准的问题-答案分析专家，请严格按照要求分析并解答，同时应参考评论建议，判断当前应归属的节点类型。
        
        用户问题： {question}
        评论建议： {documents}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
        
        根据用户问题，返回下列节点中的一个：
        calculate: 用于执行数学计算，只能用于数值计算
        weather: 用于查询城市当天及未来的实时天气情况，禁止用来查询过去时间的天气情况
        stock: 用于查询沪深300指数指定股票的开盘/收盘价
        search: 用于搜索真实世界的信息，如事实、人物、地点等，且不属于上述三类时使用
self_dicover_agent:
    select: |
        你是一个推理策略选择器。请根据用户问题，从以下预定义推理模块中选择最相关的若干项（至少1项，最多3项）：

        可用模块：
        - Step-by-step reasoning（逐步推理）
        - Analogy（类比推理）
        - Causal reasoning（因果推理）
        - Counterfactual thinking（反事实推理）
        - Abstraction and generalization（抽象与泛化）
        - Decomposition（任务分解）
        - Example-driven reasoning（示例驱动）
        - Constraint satisfaction（约束满足）
        
        要求：
        - 仅输出选中的模块名称，每行一个，不要解释。
        - 必须严格使用上述模块名称，不得改写或新增。
        
        用户问题：{question}
    adapt: |
        你是一个推理策略适配器。请根据用户问题和选定的推理模块，为每个模块生成一段定制化的推理指令（instruction）。每条指令应具体、可操作，并贴合问题上下文。
            
        要求：
        - 每个模块对应一条指令；
        - 指令以“请...”开头，聚焦如何应用该模块解决当前问题；
        - 不要重复问题，不要输出答案，只输出适配后的指令；
        - 每条指令单独一行。
        
        用户问题：{question}
        选定模块：{modules}
    plan: |
        你是一个推理结构编排器。请参考提供的可用工具将以下适配后的推理指令整合成一个清晰、有序的多步推理计划。每一步应编号，并保持逻辑连贯。
            
        要求：
        - 输出格式：Step 1: ...\nStep 2: ...\n...
        - 不要添加额外说明或总结；
        - 必须覆盖所有输入指令，可合并相似步骤；
        - 步骤应可被后续执行。
        
        适配后的指令：{instructions}
        可用的工具：{tool_descs}
    solve: |
        你是一个推理执行器。请严格按照提供的上下文和推理计划，一步步解答用户问题。在每一步中展示你的思考过程，最后给出简洁、准确的最终答案。
            
        要求：
        - 先复述推理计划；
        - 然后按步骤执行，每步标明"Step X: ..."；
        - 最终答案以"Final Answer: "开头，且仅包含答案内容；
        - 不得跳过步骤，不得引入计划外的推理。
        
        上下文：{context}
        用户问题：{question}
        推理计划：{structured_plan}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
reflexion_agent:
    response: |
        当前时间：{current_date}
        
        你是一个问题分析专家。请根据用户问题，参考提供的可用工具生成一个清晰的指令。
        
        用户问题：{question}
        可用的工具：{tool_descs}
    revise: |
        当前时间：{current_date}
        
        你是一个问题分析优化专家。请根据用户问题、提供的执行指令及生成的初步答案，用可用的工具对生成指令进行细致的优化，并给出新的优化后的指令。
        
        用户问题：{question}
        执行指令：{order_plan}
        可用的工具：{tool_descs}
        初步答案：{answer}
    execute: |
        当前时间：{current_date}
        
        用户问题：{question}
    
        你是一个问题分析回答专家。请严格按照提供的上下文和用户问题解答用户问题。

        上下文：{context}
        
        回答问题时，请参考以往回答的历史记忆。
        历史记忆：{memorys}
        
        请用中文给出详尽的、准确的最终答案。
