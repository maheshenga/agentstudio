<!doctype html>
<html>
  <head>
    <title>AgentStudio - SaaS AI Operations Platform</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AgentStudio is a multi-tenant SaaS platform for tenant management, subscriptions, modules, resource quotas, payments, and AI operations."
    />
    <meta name="theme-color" content="#1D84FF" />
    <link rel="canonical" href="%VITE_PUBLIC_SITE_URL%/" />
    <meta property="og:title" content="AgentStudio - SaaS AI Operations Platform" />
    <meta
      property="og:description"
      content="Manage tenants, subscriptions, modules, quotas, payments, and AI operations in one SaaS platform."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_PUBLIC_SITE_URL%/" />
    <meta property="og:site_name" content="AgentStudio" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgentStudio - SaaS AI Operations Platform" />
    <meta
      name="twitter:description"
      content="A multi-tenant SaaS platform for subscriptions, resource quotas, payments, modules, and AI operations."
    />
    <link rel="shortcut icon" type="image/x-icon" href="src/assets/images/favicon.ico" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AgentStudio",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "AgentStudio is a multi-tenant SaaS platform for tenant management, subscriptions, modules, resource quotas, payments, and AI operations."
      }
    </script>

    <style>
      /* 防止页面刷新时白屏的初始样式 */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #070707;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
